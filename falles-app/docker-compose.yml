services:
  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: festapp-php
    ports:
      - "9000:9000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=mysql://festapp_user:festapp_pass@db:3306/festapp_db?serverVersion=8.0&charset=utf8mb4
    networks:
      - festapp-network

  nginx:
    image: nginx:alpine
    container_name: festapp-nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - festapp-network

  db:
    image: mysql:8.0
    container_name: festapp-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: festapp_db
      MYSQL_USER: festapp_user
      MYSQL_PASSWORD: festapp_pass
    volumes:
      - festapp-mysql:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - festapp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Opcional: Adminer para admin de DB via browser
  adminer:
    image: adminer:latest
    container_name: festapp-adminer
    ports:
      - "8081:8080"
    depends_on:
      - db
    networks:
      - festapp-network
    profiles:
      - tools

  # Opcional: Mailpit para capturar emails en desarrollo
  mailpit:
    image: axllent/mailpit:latest
    container_name: festapp-mailpit
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - festapp-network
    profiles:
      - tools

volumes:
  festapp-mysql:

networks:
  festapp-network:
    driver: bridge
