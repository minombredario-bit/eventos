<header class="mobile-header" role="banner">
  <div class="bar-actions">
    @if (showBack()) {
      <button
        type="button"
        class="icon-button"
        aria-label="Volver"
        (click)="onBack()"
      >
        ←
      </button>
    } @else {
      <span class="icon-placeholder" aria-hidden="true"></span>
    }

    @if (hasAction()) {
      @if (isLogoutAction()) {
        <button
          type="button"
          class="icon-button icon-button--logout"
          aria-label="Salir"
          title="Salir"
          (click)="onAction()"
        >
          ↩
        </button>
      } @else {
        <button
          type="button"
          class="text-button"
          [attr.aria-label]="actionAriaLabel()"
          [attr.title]="actionAriaLabel()"
          (click)="onAction()"
        >
          {{ actionLabel() }}
        </button>
      }
    } @else {
      <span class="icon-placeholder" aria-hidden="true"></span>
    }
  </div>

  <h1>{{ title() }}</h1>
  @if (subtitle()) {
    <p>{{ subtitle() }}</p>
  }
</header>
