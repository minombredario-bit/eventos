parameters:
    app.cors.allowed_origins:
        - 'http://localhost:4200'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    App\EventSubscriber\ApiCorsSubscriber:
        arguments:
            $allowedOrigins: '%app.cors.allowed_origins%'
