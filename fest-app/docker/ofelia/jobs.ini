[job-exec "eventos-actualizar-estados"]
schedule = "@every 15m"
container = "festiva-php"
command = "php /var/www/html/bin/console app:eventos:actualizar-estados --env=prod"

[job-exec "usuarios-actualizar-tipo-persona"]
schedule = "0 3 * * *"
container = "festiva-php"
command = "php /var/www/html/bin/console app:usuarios:actualizar-tipo-persona --env=prod"

[job-exec "mail-queue-process"]
schedule = "@every 1m"
container = "festiva-php"
command = "php /var/www/html/bin/console app:mail-queue:process --limit=50 --env=prod"
no-overlap = true
