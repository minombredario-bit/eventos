[www]

user = www-data
group = www-data

; IMPORTANTE: escuchar en todas las interfaces para que nginx
; (contenedor separado) pueda conectar por la red Docker
listen = 0.0.0.0:9000

pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 10

; Logs hacia stdout/stderr de Docker
access.log = /proc/self/fd/2
error_log = /proc/self/fd/2
