services:

    php:
        build:
            context: .
            dockerfile: docker/backend/php/Dockerfile.dev
        container_name: festapp2-php
        restart: unless-stopped
        ports:
            - "2223:22"
        volumes:
            - app_data:/var/www/html
        environment:
            APP_ENV: dev
            APP_DEBUG: "1"
            DATABASE_URL: "mysql://${DB_USER:-festapp_user}:${DB_PASSWORD:-festapp_pass}@${DB_HOST:-db}:${DB_PORT:-3306}/${DB_NAME:-festapp_db}?serverVersion=${DB_SERVER_VERSION:-8.0}&charset=utf8mb4"
            XDEBUG_MODE: debug,develop
            XDEBUG_CONFIG: "client_host=host.docker.internal client_port=9003 idekey=PHPSTORM"
            PHP_IDE_CONFIG: "serverName=festapp-local"
            SFTP_USER_PASS: "sftppass_dev"
            SUPERADMIN_EMAIL: "${SUPERADMIN_EMAIL:-superadmin@festapp.local}"
            SUPERADMIN_PASSWORD: "${SUPERADMIN_PASSWORD:-superadmin_dev_changeme}"
            MAILER_DSN: "smtp://festapp2-mailpit:1025"
            MAILER_FROM: "festapp@festapp.local"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        depends_on:
            db:
                condition: service_healthy
        networks:
            - backend
        labels:
            ofelia.enabled: "true"
            ofelia.job-exec.mail-queue.schedule: "@every 1m"
            ofelia.job-exec.mail-queue.command: "php /var/www/html/bin/console app:mail-queue:process --limit=50 --no-interaction"
            ofelia.job-exec.event-status.schedule: "@every 10m"
            ofelia.job-exec.event-status.command: "php /var/www/html/bin/console app:eventos:actualizar-estados --no-interaction"

    back-nginx:
        build:
            context: .
            dockerfile: docker/backend/nginx/Dockerfile.dev
        container_name: festapp2-back-nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - app_data:/var/www/html:ro
        depends_on:
            - php
        networks:
            - backend
            - frontend

    # Nginx del front separado: solo proxy hacia el contenedor frontend.
    # Opcionalmente también unifica /api para evitar CORS en desarrollo.
    front-nginx:
        image: nginx:1.27-alpine
        container_name: festapp2-front-nginx
        ports:
            - "8082:80"
        volumes:
            - ./frontend/dist/frontend/browser:/usr/share/nginx/html:ro
            - ./docker/frontend/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - back-nginx
        networks:
            - frontend

    ofelia:
        image: mcuadros/ofelia:latest
        container_name: festapp2-ofelia
        restart: unless-stopped
        command: daemon --docker
        depends_on:
            - php
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        networks:
            - backend

    db:
        image: mysql:8.0
        container_name: festapp2-db
        restart: unless-stopped
        ports:
            - "3306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: rootpass_dev
            MYSQL_DATABASE: festapp_db
            MYSQL_USER: festapp_user
            MYSQL_PASSWORD: festapp_pass
        volumes:
            - festapp-mysql:/var/lib/mysql
            - ./docker/backend/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass_dev"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - backend

    adminer:
        image: adminer:latest
        container_name: festapp2-adminer
        ports:
            - "8081:8080"
        depends_on:
            - db
        networks:
            - backend
        profiles: [tools]

    mailpit:
        image: axllent/mailpit:latest
        container_name: festapp2-mailpit
        ports:
            - "1025:1025"
            - "8026:8025"
        networks:
            - backend

volumes:
    app_data:
    festapp-mysql:
    frontend_node_modules:

networks:
    backend:
        driver: bridge
    frontend:
        driver: bridge
