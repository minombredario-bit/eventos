services:
    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile.prod
        image: festapp-php:${APP_VERSION:-latest}
        pull_policy: build
        container_name: festapp-php
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "pgrep php-fpm > /dev/null || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 60s
        env_file:
            - .env.prod
        environment:
            APP_ENV: prod
            APP_DEBUG: "0"
        extra_hosts:
            - "db:10.96.1.248"
        networks:
            - backend

    nginx:
        build:
            context: .
            dockerfile: docker/nginx/Dockerfile.prod
        image: festapp-nginx:${APP_VERSION:-latest}
        pull_policy: build
        container_name: festapp-nginx
        restart: unless-stopped
        ports:
            - "8081:80"
        volumes:
            - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
            - nginx_logs:/var/log/nginx
        depends_on:
            php:
                condition: service_healthy
        networks:
            - backend
            - frontend
            -

    ofelia:
        build:
            context: .
            dockerfile: docker/ofelia/Dockerfile.prod
        image: festapp-ofelia:${APP_VERSION:-latest}
        pull_policy: build
        container_name: festapp-ofelia
        restart: unless-stopped
        depends_on:
            php:
                condition: service_healthy
        env_file:
            - .env.prod
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - ./docker/ofelia/config.ini:/etc/ofelia/config.ini:ro
        networks:
            - backend

volumes:
    nginx_logs:

networks:
    backend:
        driver: bridge
    frontend:
        driver: bridge
