services:
    php:
        build:
            context: .
            dockerfile: docker/backend/php/Dockerfile.prod
        image: festiva-php:${APP_VERSION:-latest}
        pull_policy: build
        container_name: festiva-php
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "pgrep php-fpm > /dev/null || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 60s
        env_file:
            - .env.prod
        environment:
            APP_ENV: prod
            APP_DEBUG: "0"
        extra_hosts:
            - "db:10.96.1.248"
        networks:
            - backend

    back-nginx:
        build:
            context: .
            dockerfile: docker/backend/nginx/Dockerfile.prod
        image: festiva-nginx:${APP_VERSION:-latest}
        pull_policy: build
        container_name: festiva-back-nginx
        restart: unless-stopped
        ports:
            - "127.0.0.1:8082:80"
        volumes:
            - ./docker/backend/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
            - nginx_logs:/var/log/nginx
        depends_on:
            php:
                condition: service_healthy
        networks:
            - backend
            - frontend

    front-nginx:
        build:
            context: .
            dockerfile: docker/frontend/nginx/Dockerfile.prod
        image: festiva-front-nginx:${APP_VERSION:-latest}
        pull_policy: build
        container_name: festiva-front-nginx
        restart: unless-stopped
        depends_on:
            - back-nginx
        ports:
            - "127.0.0.1:${FRONT_HTTP_PORT:-8081}:80"
        volumes:
            - front_nginx_logs:/var/log/nginx
        networks:
            - frontend
            - backend

    ofelia:
        build:
            context: .
            dockerfile: docker/ofelia/Dockerfile.prod
        image: festiva-ofelia:${APP_VERSION:-latest}
        pull_policy: build
        container_name: festiva-ofelia
        restart: unless-stopped
        depends_on:
            php:
                condition: service_healthy
        command: daemon --config=/etc/ofelia/config.ini
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - ./docker/ofelia/config.ini:/etc/ofelia/config.ini:ro
        networks:
            - backend

volumes:
    nginx_logs:
    front_nginx_logs:

networks:
    backend:
        driver: bridge
        ipam:
            config:
                - subnet: 192.168.32.0/24

    frontend:
        driver: bridge
