services:
    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile.prod
        image: festapp-php:${APP_VERSION:-latest}
        pull_policy: build
        container_name: festapp-php
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "nc -z 127.0.0.1 9000 || exit 1"]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 60s
        env_file:
            - .env.prod
        environment:
            APP_ENV: prod
            APP_DEBUG: "0"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        networks:
            - backend

    nginx:
        image: nginx:1.27-alpine
        container_name: festapp-nginx
        restart: unless-stopped
        ports:
            - "8081:80"
        volumes:
            - angular_dist:/var/www/angular:ro
            - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
            - nginx_logs:/var/log/nginx
        depends_on:
            php:
                condition: service_healthy
        networks:
            - backend
            - frontend

volumes:
    angular_dist:
    nginx_logs:

networks:
    backend:
        driver: bridge
    frontend:
        driver: bridge
