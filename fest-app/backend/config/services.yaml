parameters:
    app.cors.allowed_origins:
        - 'http://localhost:4200'
        # FIX: eliminado duplicado de localhost:4250
        - 'http://localhost:4250'
    app.mailer_from: '%env(MAILER_FROM)%'
    app.uri: '%env(DEFAULT_URI)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    Lexik\Bundle\JWTAuthenticationBundle\Services\JWTTokenManagerInterface: '@lexik_jwt_authentication.jwt_manager'

    # Register repositories explicitly as Doctrine repository services.
    # This avoids runtime resolution issues when Doctrine tries to load
    # repositoryClass declared on entities via the container repository factory.
    App\Repository\:
        resource: '../src/Repository/'
        tags: ['doctrine.repository_service']

    App\Service\EmailQueueService:
        arguments:
            $appUri: '%app.uri%'
            $mailerFrom: '%app.mailer_from%'

    App\Service\CalculadorAntiguedadService:
        arguments:
            $temporadaEntidadRepository: '@App\Repository\TemporadaEntidadRepository'
            $usuarioTemporadaCargoRepository: '@App\Repository\UsuarioTemporadaCargoRepository'

    App\Service\CalculadorReconocimientosService:
        arguments:
            $calculadorAntiguedadService: '@App\Service\CalculadorAntiguedadService'
            $reconocimientoRepository: '@App\Repository\ReconocimientoRepository'
            $usuarioReconocimientoRepository: '@App\Repository\UsuarioReconocimientoRepository'

    App\Service\PushNotificationService:
        arguments:
            $publicKey: '%env(WEB_PUSH_PUBLIC_KEY)%'
            $privateKey: '%env(WEB_PUSH_PRIVATE_KEY)%'
            $subject: '%env(WEB_PUSH_SUBJECT)%'
            # FIX: añadido $em y $pushSubscriptionRepository para limpiar suscripciones caducadas (404/410)
            $em: '@doctrine.orm.entity_manager'
            $pushSubscriptionRepository: '@App\Repository\PushSubscriptionRepository'

    App\EventSubscriber\ApiCorsSubscriber:
        arguments:
            $allowedOrigins: '%app.cors.allowed_origins%'

    App\State\InvitadoDeleteProcessor:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
            $invitadoRepository: '@App\Repository\InvitadoRepository'
            $seleccionParticipanteEventoRepository: '@App\Repository\SeleccionParticipanteEventoRepository'

    App\State\EventoWriteProcessor:
        bind:
            $persistProcessor: '@api_platform.doctrine.orm.state.persist_processor'
            # FIX: pushNotificationService y pushSubscriptionRepository se resuelven
            # por autowire gracias a los tipos declarados en el constructor.
            # No requieren bind explícito salvo que autowire esté desactivado.

    App\Security\Voter\InscripcionVoter:
        arguments:
            $relacionUsuarioRepository: '@App\Repository\RelacionUsuarioRepository'
        tags: ['security.voter']

    App\EventListener\JwtCreatedListener:
        tags:
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_jwt_created, method: onJWTCreated }

    App\EventListener\JWTAuthenticationSuccessListener:
        tags:
            - { name: kernel.event_listener, event: lexik_jwt_authentication.on_authentication_success, method: onAuthenticationSuccess }

    App\EventListener\ActividadEventoPreRemoveListener:
        tags:
            - { name: doctrine.event_listener, event: preRemove, method: preRemove }
    App\EventListener\EventoPreRemoveListener:
        tags:
            - { name: doctrine.event_listener, event: preRemove, method: preRemove }

    App\ApiPlatform\DataPersister\ActividadEventoDataPersister:
        arguments:
            $inscripcionLineaRepository: '@App\Repository\InscripcionLineaRepository'

    App\ApiPlatform\Doctrine\Extension\InscripcionOwnerExtension:
        tags:
            - { name: api_platform.doctrine.orm.query_extension.collection }
    App\ApiPlatform\Doctrine\Extension\ApiExtensionPlatform:
        tags:
            - { name: api_platform.doctrine.orm.query_extension.collection, priority: 0 }
            - { name: api_platform.doctrine.orm.query_extension.item, priority: 0 }

    # Decorate API Platform serializer context builder to add admin/form groups for Evento
    App\ApiPlatform\Serializer\CustomSerializerContextBuilder:
        decorates: 'api_platform.serializer.context_builder'
        arguments:
            $decorated: '@App\ApiPlatform\Serializer\CustomSerializerContextBuilder.inner'
        tags: []
