security:
    role_hierarchy:
        ROLE_ADMIN_ENTIDAD: [ROLE_USER]
        ROLE_ADMIN: [ROLE_ADMIN_ENTIDAD]
        ROLE_SUPERADMIN: [ROLE_ADMIN]

    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
            algorithm: auto
            cost: 4

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Usuario
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        login:
            pattern: ^/api/login
            stateless: true
            provider: app_user_provider
            user_checker: App\Security\UserActiveChecker
            json_login:
                check_path: api_login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            user_checker: App\Security\UserActiveChecker
            jwt: ~

    access_control:
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/registro, roles: ROLE_ADMIN_ENTIDAD }
        - { path: ^/api/superadmin, roles: ROLE_SUPERADMIN }
        - { path: ^/api/admin, roles: ROLE_ADMIN_ENTIDAD }
        - { path: ^/api, roles: ROLE_USER }
