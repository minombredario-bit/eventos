@if (pwa.canInstall()) {
  <div class="install-banner" aria-label="Acciones de instalación">
    <img
      src="/icons/icon-192x192.png"
      alt="FestApp"
      class="install-banner__icon"
    />

    <button class="icon-btn" type="button" (click)="pwa.dismiss()" aria-label="Cerrar">
      ✕
    </button>

    <button
      class="icon-btn"
      type="button"
      [disabled]="push.subscribing()"
      (click)="togglePush()"
      aria-label="Activar o desactivar avisos"
    >
      🔔
    </button>

    <button class="icon-btn icon-btn--primary" type="button" (click)="install()" aria-label="Instalar app">
      ⬇
    </button>
  </div>
}

@if (pwa.showIosHint()) {
  <div class="install-banner install-banner--ios" role="status" aria-label="Instalar en iPhone">
    <img
      src="/icons/icon-192x192.png"
      alt="FestApp"
      class="install-banner__icon"
    />

    <p class="install-banner__ios-text">
      Pulsa
      <svg class="install-banner__share-icon" width="16" height="16" viewBox="0 0 50 50" fill="currentColor" aria-label="botón compartir" role="img">
        <path d="M30.3 13.7L25 8.4l-5.3 5.3-1.4-1.4L25 5.6l6.7 6.7z"/>
        <path d="M24 7h2v21h-2z"/>
        <path d="M35 40H15c-1.7 0-3-1.3-3-3V19c0-1.7 1.3-3 3-3h7v2h-7c-.6 0-1 .4-1 1v18c0 .6.4 1 1 1h20c.6 0 1-.4 1-1V19c0-.6-.4-1-1-1h-7v-2h7c1.7 0 3 1.3 3 3v18c0 1.7-1.3 3-3 3z"/>
      </svg>
      y luego <strong>"Añadir a pantalla de inicio"</strong>
    </p>

    <button class="icon-btn" type="button" (click)="pwa.dismiss()" aria-label="Cerrar">
      ✕
    </button>
  </div>
}
