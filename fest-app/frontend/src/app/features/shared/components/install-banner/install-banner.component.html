@if (pwa.canInstall()) {
  <div class="install-banner" aria-label="Acciones de instalación">
    <img
      src="/icons/icon-192x192.png"
      alt="FestApp"
      class="install-banner__icon"
    />

    <button class="icon-btn" type="button" (click)="pwa.dismiss()" aria-label="Cerrar">
      ✕
    </button>

    <button
      class="icon-btn"
      type="button"
      [disabled]="push.subscribing()"
      (click)="togglePush()"
      aria-label="Activar o desactivar avisos"
    >
      🔔
    </button>

    <button class="icon-btn icon-btn--primary" type="button" (click)="install()" aria-label="Instalar app">
      ⬇
    </button>
  </div>
}
