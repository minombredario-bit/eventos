@if (pwa.canInstall() && !pwa.showIosHint()) {
  <div class="install-banner" aria-label="Acciones de instalación">
    <img
      src="/icons/icon-192x192.png"
      alt="FestApp"
      class="install-banner__icon"
    />

    <button class="icon-btn" type="button" (click)="pwa.dismiss()" aria-label="Cerrar">
      ✕
    </button>

    <button
      class="icon-btn"
      type="button"
      [disabled]="push.subscribing()"
      (click)="togglePush()"
      aria-label="Activar o desactivar avisos"
    >
      🔔
    </button>

    <button class="icon-btn icon-btn--primary" type="button" (click)="install()" aria-label="Instalar app">
      ⬇
    </button>
  </div>
}

@if (pwa.showIosHint()) {
  <div class="ios-install-card" role="status" aria-label="Instalar en iPhone">
    <img
      src="/icons/icon-192x192.png"
      alt="FestApp"
      class="ios-install-card__icon"
    />

    <div class="ios-install-card__content">
      <strong>Instala FestApp</strong>
      <span>
        Pulsa compartir
        <span class="ios-install-card__share" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M12 16V4"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M8 8L12 4L16 8"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M5 12V18C5 19.1046 5.89543 20 7 20H17C18.1046 20 19 19.1046 19 18V12"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </span>
        y “Añadir a inicio”.
      </span>
    </div>

    <button
      class="ios-install-card__close"
      type="button"
      (click)="pwa.dismiss()"
      aria-label="Cerrar aviso de instalación"
    >
      ✕
    </button>
  </div>
}
