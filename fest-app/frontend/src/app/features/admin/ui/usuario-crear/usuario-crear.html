<section class="screen admin-usuario-crear-screen">
  <app-mobile-header
    title="Nuevo usuario"
    subtitle="Censo"
    [showBack]="true"
    actionType="logout"
    (backPressed)="goBack()"
    (actionPressed)="logout()"
  />

  <div class="content">
    <article class="panel">
      <h2>Alta manual</h2>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <input type="text" formControlName="nombre" placeholder="Nombre" />
        <input type="text" formControlName="apellidos" placeholder="Apellidos" />
        <input type="email" formControlName="email" placeholder="Email" />
        <input type="password" formControlName="password" placeholder="Contraseña temporal" />
        <input type="text" formControlName="telefono" placeholder="Teléfono (opcional)" />

        <select formControlName="tipoUsuarioEconomico" aria-label="Tipo económico">
          <option value="interno">Interno</option>
          <option value="externo">Externo</option>
          <option value="invitado">Invitado</option>
        </select>


        <button type="submit" class="action-button" [disabled]="saving()">
          {{ saving() ? 'Guardando...' : 'Guardar usuario' }}
        </button>
      </form>

      @if (successMessage()) {
        <p class="feedback success" role="status">{{ successMessage() }}</p>
      }

      @if (errorMessage()) {
        <p class="feedback error" role="alert">{{ errorMessage() }}</p>
      }
    </article>
  </div>
</section>
