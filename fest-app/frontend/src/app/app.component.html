<div class="app-splash" *ngIf="loading">
  <img src="logo.png" alt="Festiva">
  <p>Cargando...</p>
</div>

<ng-container *ngIf="!loading">
  <ng-container *ngIf="authStore.user() as user">
    <app-lopd *ngIf="!user.aceptoLopd"></app-lopd>
    <router-outlet *ngIf="user.aceptoLopd"></router-outlet>
  </ng-container>
  <router-outlet *ngIf="!authStore.user()"></router-outlet>
</ng-container>
