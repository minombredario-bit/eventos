# Redirige HTTP → HTTPS
server {
    listen 80;
    server_name tudominio.com www.tudominio.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tudominio.com www.tudominio.com;

    # ── TLS ──────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Headers de seguridad ─────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Health check ─────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Symfony API  (/api/* → PHP-FPM) ──────────
    # Todo lo que empiece por /api lo maneja Symfony
    location /api {
        root /var/www/html/public;
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        root /var/www/html/public;
        fastcgi_pass festapp-php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   /var/www/html/public;
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_buffering off;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    # ── Angular SPA  (todo lo demás → dist/) ─────
    # Los archivos estáticos del build de Angular
    # se sirven desde el volumen angular_dist
    location / {
        root /var/www/angular;
        index index.html;
        # SPA fallback: si no existe el fichero, devuelve index.html
        # para que Angular Router gestione la ruta
        try_files $uri $uri/ /index.html;
    }

    # ── Cache de estáticos de Angular ─────────────
    location ~* \.(jpg|jpeg|gif|png|webp|svg|ico|woff|woff2|ttf|eot)$ {
        root /var/www/angular;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # JS y CSS de Angular con hash en el nombre → cache agresiva
    location ~* \.[0-9a-f]{8,}\.(js|css)$ {
        root /var/www/angular;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Denegar acceso a ficheros ocultos ─────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logs ─────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
